name: Update Q&A data

# 每月 1 號 UTC 02:00（台灣時間 10:00）自動跑 fetch_qa.py，
# 把證期局問答集 + 創新板 FAQ 重新解析、commit 回 main。
# 也可在 Actions 頁面手動觸發。

on:
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      skip_pdf_extract:
        description: '只更新索引，不重新抽 PDF 文字'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Purge stale PDF cache
        # 上一輪可能在 anti-direct-link 期間把 HTML 錯誤頁誤寫進
        # output/qa_pdfs/ 的 .pdf 檔案內。fetch_qa.py 會以 magic bytes
        # 自動處理，這步是 belt-and-suspenders：每次 run 從乾淨狀態開始。
        run: rm -rf output/qa_pdfs/

      - name: Run fetch_qa.py
        run: |
          if [ "${{ inputs.skip_pdf_extract }}" = "true" ]; then
            python scripts/fetch_qa.py --skip-pdf-extract
          else
            python scripts/fetch_qa.py
          fi

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/qa.json
          git add -A output/qa_pdfs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(data): monthly Q&A refresh ($(date -u +%Y-%m-%d))"
          git push
